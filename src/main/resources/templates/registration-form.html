<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
    <link rel="stylesheet" th:href="@{/css/index.css}"/>
</head>
<body>
    <!--we can use either ${student.firstName} or short form *{firstName}-->
    <form th:action="@{/displayRegisterFormData}" method="post" th:object="${student}">
        <h1>Registration Form</h1>
        <table>
            <tr>
                <td><label for="firstName">First Name</label></td>
                <td>
                    <input type="text"
                           th:field="*{firstName}"
                           id="firstName"
                           th:classappend="${#fields.hasErrors('firstName')} ? 'input-error' : ''" />
                    <p th:if="${#fields.hasErrors('firstName')}"
                       th:errors="*{firstName}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td><label for="lastName">Last Name</label></td>
                <td>
                    <input type="text" name="lastName" id="lastName" th:field="*{lastName}"
                        th:classappend="${#fields.hasErrors('lastName')} ? 'input-error' : ''" />
                    <p th:if="${#fields.hasErrors('lastName')}"
                       th:errors="*{lastName}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td><label for="email">Email</label></td>
                <td>
                    <input type="email" name="email" id="email" th:field="*{email}"
                    th:classappend="${#fields.hasErrors('email')}? 'input-error' : ''" />
                    <p th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td><label for="country">Country</label></td>
                <td>
                    <select name="country" id="country" th:field="*{country}"
                        th:classappend="${#fields.hasErrors('country')} ? 'input-error' : ''">
                        <option th:each="country : ${countries}"
                                th:value="${country}"
                                th:text="${country}">
                        </option>
                    </select>
                    <p th:if="${#fields.hasErrors('country')}"
                       th:errors="*{country}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td><label>Gender</label></td>
                <td>
                    <input type="radio" th:field="*{gender}" value="male" id="male"
                    th:classappend="${#fields.hasErrors('gender')} ? 'input-error' : ''" />
                    <label for="male">Male</label>

                    <input type="radio" th:field="*{gender}" value="female" id="female"
                    th:classappend="${#fields.hasErrors('gender')} ? 'input-error' : ''"/>
                    <label for="female">Female</label>

                    <p th:if="${#fields.hasErrors('gender')}"
                       th:errors="*{gender}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td><label>Skills</label></td>
                <td>
                    <span th:each="skill : ${skills}">
                        <input type="checkbox"
                               th:field="*{skills}"
                               th:value="${skill}"
                        th:classappend="${#fields.hasErrors('skills')} ? 'input-error' : ''"/>
                        <span th:text="${skill}"></span>
                    </span>
                    <p th:if="${#fields.hasErrors('skills')}"
                       th:errors="*{skills}"
                       class="error-message"></p>
                </td>
            </tr>
            <tr>
                <td></td>
                <td><input type="submit" value="Register" /></td>
            </tr>
        </table>
    </form>
</body>
</html>
